<script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>

<style> 
            
#scrollbubble {
    display: none;
    position: fixed;
    top: 0;
    right: 20px;
    z-index: 500;
    padding: 3px 8px;
    background-color: #000;
    color: #FFF;
    border-radius: 3px;
}

#scrollbubble:after {
    content: " ";
    position: absolute;
    top: 50%;
    right: -8px;
    height: 0;
    width: 0;
    margin-top: -4px;
    border: 4px solid transparent;
    border-left-color: #000;
}

</style>

<div id="scrollbubble"> </div>        

<script>
    
    if ($(window).width() >= 1024) {
        var scrollTimer = null;
        $(window).scroll(function() {
            var viewportHeight = $(this).height(),
                scrollbarHeight = viewportHeight / $(document).height() *
                viewportHeight,
                progress = $(this).scrollTop() / ($(document).height() -
                    viewportHeight),
                distance = progress * (viewportHeight - scrollbarHeight) +
                scrollbarHeight / 2 - $('#scrollbubble').height() / 2;
            $('#scrollbubble').css('top', distance).text(Math.round(
                progress * 100) + '%').fadeIn(100);
            // Fade out the annotation after 1 second of no scrolling.
            if (scrollTimer !== null) {
                clearTimeout(scrollTimer);
            }
            scrollTimer = setTimeout(function() {
                $('#scrollbubble').fadeOut();
            }, 1000);
        });
    }
    
</script>
